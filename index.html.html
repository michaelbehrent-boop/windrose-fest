<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50 Jahre Windrose – Brunnenfest Einsatzplan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f5;min-height:100vh}
.container{max-width:680px;margin:0 auto;padding:1rem}

/* Nav */
.main-tabs{display:flex;gap:6px;margin-bottom:1.25rem;border-bottom:1px solid #e0e0e0;padding-bottom:.75rem}
.main-tab{padding:7px 16px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;cursor:pointer;font-size:13px;color:#555;transition:all .15s}
.main-tab:hover{background:#f0f0f0}
.main-tab.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500}

/* Hero */
.hero{border-radius:12px;overflow:hidden;margin-bottom:1.5rem;position:relative;background:#1F4E79}
.hero-img{width:100%;height:220px;object-fit:cover;object-position:center 40%;display:block;opacity:.82}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,30,60,.88) 0%,rgba(10,30,60,.3) 55%,transparent 100%)}
.hero-text{position:absolute;bottom:0;left:0;right:0;padding:1.25rem 1.5rem;color:#fff}
.hero-eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.85;margin-bottom:5px}
.hero-title{font-size:20px;font-weight:500;line-height:1.25;margin-bottom:4px}
.hero-sub{font-size:12px;opacity:.82}

/* Programm */
.day-block{margin-bottom:1.25rem}
.day-label{font-size:13px;font-weight:500;padding:6px 12px;background:#f0f0f0;border-radius:8px;margin-bottom:6px;border:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}
.day-label .regie{font-size:11px;color:#888}
.act-row{display:grid;grid-template-columns:52px 1fr;padding:7px 0;border-bottom:1px solid #eee}
.act-row:last-child{border-bottom:none}
.act-time{font-size:12px;color:#888;font-variant-numeric:tabular-nums;padding-top:2px}
.act-name{font-size:13px;font-weight:500}
.act-note{font-size:12px;color:#666;margin-top:1px}
.cta-box{background:#E6F1FB;border-radius:12px;padding:12px 16px;margin-top:1rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border:1px solid #B5D4F4}
.cta-text{font-size:13px;color:#0C447C}
.cta-btn{padding:7px 14px;border-radius:8px;border:1px solid #185FA5;background:#185FA5;color:#fff;font-size:13px;cursor:pointer;white-space:nowrap}
.cta-btn:hover{background:#0C447C}

/* Plan */
.day-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.day-tab{padding:6px 14px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;cursor:pointer;font-size:13px;color:#555;transition:all .15s}
.day-tab:hover{background:#f0f0f0}
.day-tab.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500}
.day-tab.aufbau.active{background:#854F0B;color:#FAEEDA;border-color:#854F0B}
.day-tab.abbau.active{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11}
.day-header{background:#f8f8f8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;border:1px solid #e0e0e0}
.day-title{font-size:17px;font-weight:500;margin-bottom:4px}
.day-meta{font-size:12px;color:#666;line-height:1.7}
.regie-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;background:#B5D4F4;color:#0C447C;margin-left:8px;font-weight:500}
.section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#999;margin:1.25rem 0 .5rem}
.meeting-box{background:#EEEDFE;border-radius:12px;padding:10px 14px;margin-bottom:1rem;border:1px solid #AFA9EC}
.meeting-title{font-size:13px;font-weight:500;color:#3C3489;margin-bottom:2px}
.meeting-body{font-size:12px;color:#534AB7}
.schicht-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.75rem}
.schicht-tab{padding:5px 12px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;cursor:pointer;font-size:12px;color:#555;position:relative;transition:all .15s}
.schicht-tab:hover{background:#f0f0f0}
.schicht-tab.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500}
.schicht-tab .alert-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:#E24B4A;border:1.5px solid #fff}
.schicht-info{font-size:12px;color:#666;margin-bottom:1rem;padding:6px 10px;background:#f8f8f8;border-radius:8px;border:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.bedarf{font-weight:500;color:#1a1a1a}
.gesucht-count{font-size:11px;background:#FCEBEB;color:#791F1F;border-radius:10px;padding:2px 8px;border:1px solid #F09595}
.station-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;margin-bottom:8px;overflow:hidden}
.station-card.has-alert{border-color:#F09595}
.station-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.station-head:hover{background:#f8f8f8}
.station-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.station-name{font-weight:500;font-size:14px;flex:1}
.station-status{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap}
.status-open{background:#FAEEDA;color:#633806;border:1px solid #FAC775}
.status-done{background:#EAF3DE;color:#27500A;border:1px solid #C0DD97}
.status-alert{background:#FCEBEB;color:#791F1F;border:1px solid #F09595}
.station-chevron{font-size:12px;color:#aaa;transition:transform .2s;margin-left:4px}
.station-chevron.open{transform:rotate(90deg)}
.station-body{padding:0 14px 12px;border-top:1px solid #eee;display:none}
.station-body.open{display:block}
.slot-row{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #eee}
.slot-row:last-child{border-bottom:none}
.slot-num{font-size:11px;color:#aaa;text-align:center}
.slot-middle{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.slot-person{font-size:12px;background:#f8f8f8;border-radius:8px;padding:5px 10px;border:1px dashed #d0d0d0;cursor:pointer;color:#888;width:100%}
.slot-person:hover{border-color:#aaa}
.slot-person.filled{background:#EAF3DE;color:#27500A;border-style:solid;border-color:#C0DD97}
.slot-person.fixed{background:#f8f8f8;color:#aaa;border-style:solid;cursor:default;font-style:italic}
.slot-person.wanted{background:#FCEBEB;color:#791F1F;border-style:solid;border-color:#F09595;font-weight:500}
.slot-role-label{font-size:11px;color:#aaa}
.slot-actions{display:flex;gap:4px}
.btn-del{font-size:11px;padding:3px 7px;border-radius:8px;border:1px solid #d0d0d0;background:none;color:#aaa;cursor:pointer}
.btn-del:hover{background:#f0f0f0}
.btn-ausfall{font-size:11px;padding:3px 7px;border-radius:8px;border:1px solid #F09595;background:none;color:#A32D2D;cursor:pointer;white-space:nowrap}
.btn-ausfall:hover{background:#FCEBEB}
.btn-found{font-size:11px;padding:3px 7px;border-radius:8px;border:1px solid #C0DD97;background:none;color:#27500A;cursor:pointer}
.btn-found:hover{background:#EAF3DE}
.hilfe-item{display:grid;grid-template-columns:70px 1fr 80px 30px;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #eee}
.hilfe-item:last-child{border-bottom:none}
.hilfe-time{font-size:12px;color:#666}
.hilfe-task{font-size:13px}
.hilfe-spots{font-size:12px;text-align:center;background:#FAEEDA;color:#633806;border-radius:8px;padding:3px 6px;border:1px solid #FAC775}
.hilfe-spots.full{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.hilfe-del{background:none;border:1px solid #d0d0d0;border-radius:8px;cursor:pointer;color:#aaa;font-size:13px;padding:1px 7px}
.hilfe-del:hover{background:#f0f0f0}
.add-hilfe-row{display:grid;grid-template-columns:70px 1fr 80px auto;gap:6px;align-items:center;margin-top:10px;padding-top:8px;border-top:1px dashed #d0d0d0}
.add-hilfe-row input,.add-hilfe-row select{font-size:12px;border:1px solid #d0d0d0;border-radius:8px;padding:5px 8px;background:#fff;color:#1a1a1a;width:100%}
.add-btn{padding:5px 10px;border-radius:8px;border:1px solid #185FA5;background:none;color:#185FA5;font-size:12px;cursor:pointer;white-space:nowrap}
.add-btn:hover{background:#E6F1FB}
.admin-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f8f8f8;border-radius:8px;margin-bottom:1rem;border:1px solid #e0e0e0;font-size:12px;color:#666;flex-wrap:wrap}
.admin-bar.active{background:#EAF3DE;border-color:#C0DD97;color:#27500A}
.admin-bar button{padding:4px 10px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;cursor:pointer;font-size:12px;color:#555}
.admin-bar button:hover{background:#f0f0f0}
.admin-bar input{font-size:12px;border:1px solid #d0d0d0;border-radius:8px;padding:4px 8px;background:#fff;color:#1a1a1a;width:130px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:1rem}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.legend-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.save-indicator{font-size:11px;color:#aaa;text-align:right;margin-top:.75rem;padding-top:.75rem;border-top:1px solid #eee}
.save-indicator.saved{color:#3B6D11}
.sync-bar{background:#FFF8E6;border:1px solid #FAC775;border-radius:8px;padding:7px 12px;font-size:12px;color:#633806;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sync-setup{background:#f0f8ff;border:1px solid #B5D4F4;border-radius:8px;padding:10px 14px;font-size:12px;color:#0C447C;margin-bottom:1rem}
.sync-setup h4{font-size:13px;font-weight:600;margin-bottom:6px}
.sync-setup p{margin-bottom:8px;line-height:1.5}
.sync-setup input{width:100%;font-size:12px;border:1px solid #B5D4F4;border-radius:8px;padding:5px 8px;margin-bottom:6px;background:#fff}
.sync-setup button{padding:5px 12px;border-radius:8px;border:1px solid #185FA5;background:#185FA5;color:#fff;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="main-tabs">
    <div class="main-tab active" onclick="showView('programm')">Programm</div>

  </div>
  <div id="view-programm"></div>
  <div id="view-plan" style="display:none"></div>
</div>

// ── Crypto ───────────────────────────────────────────────────────────
async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function saveLocal(){ localStorage.setItem(LOCAL_KEY, JSON.stringify(STATE)); }
function loadLocal(){ try{ const s=localStorage.getItem(LOCAL_KEY); if(s) STATE=JSON.parse(s); }catch(e){} }

async function loadFromBin(){
  if(!SYNC_ENABLED()) return;
  try{
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
      {headers:{"X-Master-Key":JSONBIN_KEY}});
    if(r.ok){ const d=await r.json(); STATE=d.record; saveLocal(); }
  }catch(e){ console.warn("Sync-Fehler (Laden):",e); }
}

async function saveToBin(){
  if(!SYNC_ENABLED()) return;
  try{
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY},
      body:JSON.stringify(STATE)
    });
  }catch(e){ console.warn("Sync-Fehler (Speichern):",e); }
}

function scheduleSave(){
  saveLocal();
  if(!SYNC_ENABLED()) return;
  SYNC_DIRTY=true;
  clearTimeout(SYNC_TIMER);
  SYNC_TIMER=setTimeout(async()=>{
    await saveToBin();
    SYNC_DIRTY=false;
    const el=document.getElementById("save-ind");
    if(el){el.textContent="☁️ Synchronisiert "+new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
      el.className="save-indicator saved";
      setTimeout(()=>{if(el){el.textContent="Automatische Synchronisierung aktiv";el.className="save-indicator";}},3000);}
  }, 1500);
}

async function saveSync(){
  const bid=document.getElementById("inp-bin")?.value.trim();
  const key=document.getElementById("inp-key")?.value.trim();
  if(!bid||!key){alert("Bitte beide Felder ausfüllen.");return;}
  JSONBIN_BIN_ID=bid; JSONBIN_KEY=key;
  localStorage.setItem("wb_bin_id",bid);
  localStorage.setItem("wb_api_key",key);
  await loadFromBin();
  renderPlanView();
  renderDay(currentDay);
}

function resetSync(){
  JSONBIN_BIN_ID=""; JSONBIN_KEY="";
  localStorage.removeItem("wb_bin_id");
  localStorage.removeItem("wb_api_key");
  renderPlanView(); renderDay(currentDay);
}

// ── Card rendering ────────────────────────────────────────────────────
function renderStationCard(dayId,schichtId,st){
  let total=0,filled=0,wantedN=0;
  st.slots.forEach((sl,sli)=>{for(let p=0;p<sl.count;p++){total++;const k=slotKey(dayId,schichtId,st.key,sli,p);const wk=wantedKey(dayId,schichtId,st.key,sli,p);if(sl.fixed){filled++;}else if(STATE.wanted[wk]){wantedN++;}else if(STATE.persons[k]){filled++;}}});
  const hasAlert=wantedN>0;const complete=filled>=total&&!hasAlert;
  let statusCls=complete?"status-done":(hasAlert?"status-alert":"status-open");
  let statusLabel=hasAlert?`${wantedN} Ersatz gesucht`:`${filled}/${total} besetzt`;
  let html=`<div class="station-card${hasAlert?" has-alert":""}">
    <div class="station-head" onclick="toggleCard('${dayId}','${schichtId}','${st.key}')">
      <div class="station-dot" style="background:${st.color}"></div>
      <div class="station-name">${st.name}</div>
      <div class="station-status ${statusCls}">${statusLabel}</div>
      <div class="station-chevron" id="chev-${dayId}-${schichtId}-${st.key}">&#9654;</div>
    </div>
    <div class="station-body" id="body-${dayId}-${schichtId}-${st.key}"><div style="height:6px"></div>`;
  st.slots.forEach((sl,sli)=>{
    for(let p=0;p<sl.count;p++){
      const k=slotKey(dayId,schichtId,st.key,sli,p);
      const wk=wantedKey(dayId,schichtId,st.key,sli,p);
      const isWanted=!sl.fixed&&STATE.wanted[wk];
      const storedName=STATE.persons[k]||(sl.fixed?(sl.prefill||""):"");
      const cls=sl.fixed?"fixed":(isWanted?"wanted":(storedName?"filled":""));
      const label=isWanted?`Ersatz gesucht (war: ${storedName||"?"})`:(storedName||(sl.count>1?`Person ${p+1} eintragen …`:"Eintragen …"));
      const oc=sl.fixed?"":`onclick="assignSlot('${dayId}','${schichtId}','${st.key}',${sli},${p})"`;
      html+=`<div class="slot-row">
        <div class="slot-num">${p+1}</div>
        <div class="slot-middle">
          <div class="slot-person ${cls}" ${oc}>${label}</div>
          <div class="slot-role-label">${sl.role}</div>
        </div>
        <div class="slot-actions">`;
      if(!sl.fixed&&storedName&&!isWanted&&ADMIN_MODE)
        html+=`<button class="btn-ausfall" onclick="markWanted('${dayId}','${schichtId}','${st.key}',${sli},${p})">Ausfall</button>`;
      if(!sl.fixed&&isWanted)
        html+=`<button class="btn-found" onclick="clearWanted('${dayId}','${schichtId}','${st.key}',${sli},${p})">Gefunden</button>`;
      if(!sl.fixed&&storedName&&!isWanted&&ADMIN_MODE)
        html+=`<button class="btn-del" onclick="delSlot('${dayId}','${schichtId}','${st.key}',${sli},${p})" title="Löschen">×</button>`;
      html+=`</div></div>`;
    }
  });
  html+=`</div></div>`;
  return html;
}

function adminBar(){
  if(ADMIN_MODE) return`<div class="admin-bar active">🔑 Admin-Modus aktiv <button onclick="logoutAdmin()">Abmelden</button></div>`;
  return`<div class="admin-bar">Admin: <input type="password" id="apw" placeholder="Passwort …" onkeydown="if(event.key==='Enter')loginAdmin()"><button onclick="loginAdmin()">Anmelden</button></div>`;
}

function renderAufbauHilfe(){
  const hilfe=STATE.aufbauHilfe||[];
  let html=`<div class="section-label">Variable Hilfsgesuche</div>
  <div class="station-card">
    <div class="station-head" onclick="toggleCard('do','_','hilfe')">
      <div class="station-dot" style="background:#854F0B"></div>
      <div class="station-name">Hilfe gesucht – offen für alle</div>
      <div class="station-status status-open">${hilfe.length} Gesuche</div>
      <div class="station-chevron open" id="chev-do-_-hilfe">&#9654;</div>
    </div>
    <div class="station-body open" id="body-do-_-hilfe"><div style="height:6px"></div>`;
  hilfe.forEach((h,i)=>{
    const spotsLabel=h.spots===0?`${(h.signups||[]).length} angemeldet`:`${(h.signups||[]).length}/${h.spots} Plätze`;
    const full=h.spots>0&&(h.signups||[]).length>=h.spots;
    html+=`<div class="hilfe-item">
      <div class="hilfe-time">${h.time} Uhr</div>
      <div class="hilfe-task">${h.task}</div>
      <div class="hilfe-spots${full?" full":""}">${spotsLabel}</div>
      ${ADMIN_MODE?`<button class="hilfe-del" onclick="delHilfe(${i})">×</button>`:`<span></span>`}
    </div>`;
  });
  if(ADMIN_MODE){
    html+=`<div class="add-hilfe-row">
      <input type="text" id="nh-time" placeholder="14:00" maxlength="5">
      <input type="text" id="nh-task" placeholder="Aufgabe …">
      <select id="nh-spots"><option value="0">offen</option><option value="1">1 Person</option><option value="2" selected>2 Personen</option><option value="3">3 Personen</option><option value="4">4 Personen</option></select>
      <button class="add-btn" onclick="addHilfe()">+ Hinzufügen</button>
    </div>`;
  }
  html+=`</div></div>`;
  return html;
}

function schichtHasAlert(dayId,schicht){
  return getSchichtStations(dayId,schicht).some(st=>st.slots.some((sl,sli)=>{
    if(sl.fixed)return false;
    for(let p=0;p<sl.count;p++){if(STATE.wanted[wantedKey(dayId,schicht.id,st.key,sli,p)])return true;}
    return false;
  }));
}

function renderFestDay(day){
  const schichten=SCHICHTEN[day.id];
  const activeId=ACTIVE_SCHICHT[day.id];
  const schicht=schichten.find(s=>s.id===activeId);
  const stations=getSchichtStations(day.id,schicht);
  let total=0,filledN=0,wantedN=0;
  stations.forEach(st=>st.slots.forEach((sl,sli)=>{for(let p=0;p<sl.count;p++){total++;const k=slotKey(day.id,activeId,st.key,sli,p);const wk=wantedKey(day.id,activeId,st.key,sli,p);if(sl.fixed)filledN++;else if(STATE.wanted[wk])wantedN++;else if(STATE.persons[k])filledN++;}}));
  let html=`<div class="day-header">
    <div class="day-title">${day.title}<span class="regie-badge">Regie: ${day.regie}</span></div>
    <div class="day-meta">${day.teamMeeting?`Alle Helfer ab <strong>${day.teamMeeting.time} Uhr</strong> (Teammeeting) &nbsp;·&nbsp; `:""}Catering ab <strong>${day.open}</strong> &nbsp;·&nbsp; Bühne ab <strong>${day.stageOpen}</strong> &nbsp;·&nbsp; Ende ca. <strong>${day.close}</strong></div>
  </div>`;
  if(day.teamMeeting) html+=`<div class="meeting-box"><div class="meeting-title">Teammeeting ${day.teamMeeting.time} Uhr – alle Helfer</div><div class="meeting-body">Pflichttermin: Einweisung, Erstinbetriebnahme aller Stationen.</div></div>`;
  html+=renderSyncSetup();
  html+=adminBar();
  html+=`<div class="section-label">Schicht auswählen</div><div class="schicht-tabs">`;
  schichten.forEach(s=>{const a=s.id===activeId?" active":"";const alert=schichtHasAlert(day.id,s);html+=`<div class="schicht-tab${a}" onclick="selectSchicht('${day.id}','${s.id}')">${s.label}${alert?`<span class="alert-dot"></span>`:""}</div>`;});
  html+=`</div>`;
  html+=`<div class="schicht-info"><span><strong>${schicht.von}–${schicht.bis} Uhr</strong> &nbsp;·&nbsp; ${schicht.reduced?"Ruhige Zeit: je 1 Person":"Voller Betrieb: je 2 Personen"} &nbsp;·&nbsp; <span class="bedarf">${filledN}/${total} besetzt</span></span>${wantedN>0?`<span class="gesucht-count">${wantedN} Ersatz gesucht</span>`:""}</div>`;
  html+=`<div class="section-label">Dienste – ${schicht.von} bis ${schicht.bis} Uhr</div>`;
  stations.forEach(st=>{html+=renderStationCard(day.id,activeId,st);});
  return html;
}

function renderDay(day){
  let html="";
  if(day.type==="aufbau"){
    const stations=getAufbauStations();
    html=`<div class="day-header"><div class="day-title">${day.title}</div><div class="day-meta">Aufbauzeit: <strong>12:00–17:00 Uhr</strong></div></div>`;
    html+=renderSyncSetup();
    html+=adminBar();
    html+=renderAufbauHilfe();
    html+=`<div class="section-label">Feste Rollen – 12:00–17:00 Uhr</div>`;
    stations.forEach(st=>{html+=renderStationCard("do","aufbau",st);});
  } else if(day.type==="abbau"){
    const stations=getAbbauStations();
    html=`<div class="day-header"><div class="day-title">${day.title}</div><div class="day-meta">${day.notes}</div></div>`;
    html+=renderSyncSetup();
    html+=adminBar();
    html+=`<div class="section-label">Rollen Abbautag</div>`;
    stations.forEach(st=>{html+=renderStationCard("di","abbau",st);});
  } else { html=renderFestDay(day); }
  document.getElementById("day-content").innerHTML=html;
  document.getElementById("save-ind").textContent=SYNC_ENABLED()?"Automatische Synchronisierung aktiv":"Lokal gespeichert (ohne Sync)";
}

// ── Actions ───────────────────────────────────────────────────────────
function toggleCard(d,s,k){document.getElementById(`body-${d}-${s}-${k}`)?.classList.toggle("open");document.getElementById(`chev-${d}-${s}-${k}`)?.classList.toggle("open");}

function assignSlot(dayId,schichtId,stKey,sli,pi){
  const k=slotKey(dayId,schichtId,stKey,sli,pi);
  const wk=wantedKey(dayId,schichtId,stKey,sli,pi);
  const isWanted=STATE.wanted[wk];
  const cur=STATE.persons[k]||"";
  if(!ADMIN_MODE&&cur&&!isWanted){alert("Dieser Slot ist bereits vergeben. Wende dich an den Admin.");return;}
  const name=prompt(isWanted?"Ersatz gefunden – dein Name:":"Dein Name (leer = entfernen):",cur);
  if(name===null)return;
  const trimmed=name.trim();
  STATE.persons[k]=trimmed;
  if(trimmed&&isWanted){delete STATE.wanted[wk];}
  if(!trimmed){delete STATE.persons[k];}
  scheduleSave();
  renderDay(currentDay);
  document.getElementById(`body-${dayId}-${schichtId}-${stKey}`)?.classList.add("open");
  document.getElementById(`chev-${dayId}-${schichtId}-${stKey}`)?.classList.add("open");
}

function delSlot(dayId,schichtId,stKey,sli,pi){
  if(!ADMIN_MODE)return;
  const k=slotKey(dayId,schichtId,stKey,sli,pi);
  delete STATE.persons[k];
  scheduleSave(); renderDay(currentDay);
  document.getElementById(`body-${dayId}-${schichtId}-${stKey}`)?.classList.add("open");
}

function markWanted(dayId,schichtId,stKey,sli,pi){
  if(!ADMIN_MODE||!confirm("Ausfall melden?"))return;
  STATE.wanted[wantedKey(dayId,schichtId,stKey,sli,pi)]=true;
  scheduleSave(); renderDay(currentDay);
  document.getElementById(`body-${dayId}-${schichtId}-${stKey}`)?.classList.add("open");
}
function clearWanted(dayId,schichtId,stKey,sli,pi){
  const wk=wantedKey(dayId,schichtId,stKey,sli,pi);
  const k=slotKey(dayId,schichtId,stKey,sli,pi);
  const name=prompt("Ersatz gefunden – Name eintragen:");
  if(name===null)return;
  delete STATE.wanted[wk];
  if(name.trim()) STATE.persons[k]=name.trim();
  scheduleSave(); renderDay(currentDay);
}
function selectSchicht(dayId,schichtId){ACTIVE_SCHICHT[dayId]=schichtId;renderDay(currentDay);}

function addHilfe(){
  const time=document.getElementById("nh-time")?.value.trim();
  const task=document.getElementById("nh-task")?.value.trim();
  const spots=parseInt(document.getElementById("nh-spots")?.value||"0");
  if(!time||!task){alert("Bitte Uhrzeit und Aufgabe eintragen.");return;}
  if(!STATE.aufbauHilfe) STATE.aufbauHilfe=[];
  STATE.aufbauHilfe.push({time,task,spots,signups:[]});
  STATE.aufbauHilfe.sort((a,b)=>a.time.localeCompare(b.time));
  scheduleSave(); renderDay(currentDay);
  document.getElementById("body-do-_-hilfe")?.classList.add("open");
}
function delHilfe(i){
  if(!ADMIN_MODE||!confirm(`"${STATE.aufbauHilfe[i].task}" löschen?`))return;
  STATE.aufbauHilfe.splice(i,1);scheduleSave();renderDay(currentDay);
  document.getElementById("body-do-_-hilfe")?.classList.add("open");
}

async function loginAdmin(){
  const pw=document.getElementById("apw")?.value||"";
  const h=await sha256(pw);
  if(h===ADMIN_HASH){ADMIN_MODE=true;renderDay(currentDay);}
  else alert("Falsches Passwort.");
}
function logoutAdmin(){ADMIN_MODE=false;renderDay(currentDay);}

// ── Navigation ────────────────────────────────────────────────────────
let currentView="programm";
let currentDay=DAYS[0];

function showView(v){
  currentView=v;
  document.querySelectorAll(".main-tab").forEach((el,i)=>el.classList.toggle("active",["programm","plan"][i]===v));
  document.getElementById("view-programm").style.display=v==="programm"?"":"none";
  document.getElementById("view-plan").style.display=v==="plan"?"":"none";
  if(v==="plan") renderPlanView();
}

function renderPlanView(){
  const dayTabsHtml=DAYS.map(d=>`<div class="day-tab ${d.type}${d.id===currentDay.id?" active":""}" onclick="selectDay('${d.id}')">${d.label}</div>`).join("");
  document.getElementById("view-plan").innerHTML=`<div class="day-tabs">${dayTabsHtml}</div><div id="day-content"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-sq" style="background:#EAF3DE;border:1px solid #C0DD97"></div>Besetzt</div>
      <div class="legend-item"><div class="legend-sq" style="background:#FAEEDA;border:1px solid #FAC775"></div>Offen</div>
      <div class="legend-item"><div class="legend-sq" style="background:#FCEBEB;border:1px solid #F09595"></div>Ersatz gesucht</div>
    </div>
    <div class="save-indicator" id="save-ind">Lokal gespeichert</div>`;
  renderDay(currentDay);
}

function selectDay(id){currentDay=DAYS.find(d=>d.id===id);renderPlanView();}

loadLocal();

showView("programm");
